apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: ambient-code
data:
  # OTLP endpoint for your central collector
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-collector.observability-hub.svc.cluster.local:4318"

  # Service name will be suffixed with session ID by the operator
  OTEL_SERVICE_NAME: "claude-code-runner"

  # Export traces via OTLP protocol
  OTEL_TRACES_EXPORTER: "otlp"

  # Resource attributes for all traces
  # Additional session-specific attributes are added by the runner
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ambient-code,deployment.environment=production"

  # Optional: Set trace sampling (1.0 = 100%, 0.1 = 10%)
  # OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  # OTEL_TRACES_SAMPLER_ARG: "1.0"
